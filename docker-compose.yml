services:
  postgres:
    image: postgres:17
    container_name: sherikmatta-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: sherikmatta
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sherikmatta-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: sherikmatta-pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sherikmatta.uz
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data: